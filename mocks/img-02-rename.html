<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="mocks.css">
<style>
  body{margin:0;background:#fff}
  .wrap{width:1400px;height:600px;position:relative;overflow:hidden;
    background:linear-gradient(115deg,#FFE8EC 0%,#FDFFFF 42%,#E7F1F8 100%);
    display:flex;align-items:center;justify-content:center;gap:60px}
  .term{width:560px;border-radius:14px;background:#1D1E24;overflow:hidden;box-shadow:0 24px 60px rgba(20,20,30,.24)}
  .tbar{height:38px;background:#2A2B33;display:flex;align-items:center;padding:0 16px;gap:8px}
  .dot2{width:12px;height:12px;border-radius:6px}
  .ttitle{flex:1;text-align:center;color:#8A8B94;font-size:13px;font-weight:600;font-family:"SF Mono",Menlo,monospace;margin-right:44px}
  .tbody{padding:18px 24px 22px;font-family:"SF Mono",Menlo,monospace;font-size:14.5px;line-height:1.8;color:#D6D7DE}
  .k{color:#7DD3FC}.s{color:#FDBA74}.dim{color:#8A8B94}.del{color:#FF6B6B;text-decoration:line-through}.add{color:#4ADE80}
  .arrow{font-size:44px;color:var(--primary);font-weight:800}
  .pillDemo{display:flex;flex-direction:column;gap:16px;align-items:center}
  .navpill2{height:60px;border-radius:999px;background:rgba(255,255,255,.85);box-shadow:0 10px 25px rgba(0,0,0,.12);
    display:flex;align-items:center;justify-content:space-evenly;padding:6px;width:330px}
  .cap{font-size:14px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--text2)}
</style></head><body>
<div class="wrap">

    <div class="tbody">
