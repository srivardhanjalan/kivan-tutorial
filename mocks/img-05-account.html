<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="mocks.css">
<style>
  body{margin:0;background:#fff}
  .wrap{width:1400px;height:820px;position:relative;overflow:hidden;
    background:linear-gradient(115deg,#FFE8EC 0%,#FDFFFF 42%,#E7F1F8 100%);
    display:flex;align-items:flex-start;justify-content:center;gap:100px;padding-top:64px;box-sizing:border-box}
  .col{display:flex;flex-direction:column;align-items:center;gap:20px}
  .shot{width:300px;border-radius:32px;overflow:hidden;box-shadow:0 26px 60px rgba(20,20,30,.24);border:1px solid #e6e6ea}
  .shot img{display:block;width:100%}
  .lbl2{font-size:16px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--text2)}
  .lbl2.bad{color:#E24E64}
</style></head><body>
<div class="wrap">
  <div class="col"><div class="shot"><img src="shot-05-settings.png"></div><div class="lbl2">edit yourself</div></div>
  <div class="col"><div class="shot"><img src="shot-05-delete.png"></div><div class="lbl2 bad">erase yourself</div></div>
</div>
</body></html>
